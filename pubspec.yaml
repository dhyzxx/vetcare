name: vetcare
description: Pet health management application.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  image_picker: ^1.0.7
  # firebase_messaging: ^14.7.15
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  http: ^1.2.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"